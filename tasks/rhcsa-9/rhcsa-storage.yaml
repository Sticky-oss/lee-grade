# RHCSA (EX200): an extra filesystem mounted persistently.
# Worked solution: tasks/rhcsa-9/solutions/rhcsa-storage/solve.sh
# (Uses a loopback-backed image so it works on the lab VM without spare disks;
# on a real exam this would be an LVM logical volume or a partition.)
schema_version: 1
id: rhcsa-storage
title: Persistent extra filesystem
domain: storage
track: rhcsa-9
time_minutes: 20
description: |
  Provision sealed storage for intercepted payloads — and make sure it
  survives a cold boot:
    - an xfs filesystem mounted at /mnt/data
    - the mount made persistent in /etc/fstab
  (CALYX stages a spare device for you when this directive deploys)

checks:
  - id: data-mountpoint
    description: /mnt/data is a directory
    hint: 'mkdir -p /mnt/data'
    why: "A filesystem mounts onto an existing directory; create the mountpoint first."
    type: file
    path: /mnt/data
    kind: directory

  - id: data-mounted-xfs
    description: /mnt/data is mounted as xfs
    hint: 'mkfs.xfs the device, then mount it at /mnt/data'
    why: "mkfs.xfs writes the filesystem and mount attaches it — but a manual mount disappears on reboot."
    type: mount
    mountpoint: /mnt/data
    fstype: xfs

  - id: data-in-fstab
    description: /mnt/data is listed in /etc/fstab (persistent)
    hint: 'add a /mnt/data line to /etc/fstab so it mounts on boot'
    why: "Persistence lives in /etc/fstab; without an entry the mount won't return on boot (the #1 RHCSA trap). Verify with 'mount -a' before trusting it."
    type: file-content
    path: /etc/fstab
    contains: /mnt/data
