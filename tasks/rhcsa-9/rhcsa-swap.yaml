# RHCSA (EX200): add and persist swap space.
# Worked solution: solutions/solve-rhcsa-practice.sh
schema_version: 1
id: rhcsa-swap
title: Additional swap space
domain: storage
track: rhcsa-9
time_minutes: 15
description: |
  This node will run memory-hungry payloads mid-op. Give it overflow memory so
  it never stalls under load:
    - a 256 MiB swap file at /swapfile (mode 0600), activated
    - made persistent in /etc/fstab

checks:
  - id: swapfile-active
    description: /swapfile is active as swap
    hint: 'chmod 0600 /swapfile; mkswap /swapfile; swapon /swapfile'
    why: "Swap must be formatted with mkswap and activated with swapon; a swap FILE also needs mode 0600 or mkswap warns it is insecure."
    type: command
    run: swapon --show=NAME --noheadings
    contains: /swapfile

  - id: swapfile-fstab
    description: /swapfile has a real swap entry in /etc/fstab
    hint: 'add a real line "/swapfile none swap defaults 0 0" to /etc/fstab (not a comment)'
    why: "Swap re-activates on boot only via a real /etc/fstab swap line; a commented or malformed entry would pass a substring match but never enable on reboot."
    type: command
    run: "grep -qE '^/swapfile[[:space:]].*swap' /etc/fstab"
