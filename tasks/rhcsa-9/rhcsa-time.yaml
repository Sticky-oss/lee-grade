# RHCSA (EX200): time synchronization and timezone.
# Worked solution: solutions/solve-rhcsa-practice.sh
schema_version: 1
id: rhcsa-time
title: Time service and timezone
domain: time-service
track: rhcsa-9
time_minutes: 10
description: |
  A field node with a drifting clock is a liability — timestamps must hold up
  in evidence. Synchronise and localise:
    - chronyd (the NTP client) enabled at boot and running now
    - the system timezone set to America/Toronto

checks:
  - id: chronyd-running
    description: chronyd is enabled and active
    hint: 'systemctl enable --now chronyd'
    why: "chronyd syncs the clock to NTP; it must be enabled and active for the time to stay correct."
    type: service-state
    unit: chronyd
    enabled: true
    active: true

  - id: timezone
    description: the system timezone is America/Toronto
    hint: 'timedatectl set-timezone America/Toronto'
    why: "Timezone is separate from the clock: timedatectl set-timezone repoints /etc/localtime while the hardware clock stays UTC."
    type: command
    run: timedatectl show -p Timezone --value
    equals: America/Toronto
