# RHCSA (EX200): users, groups, supplementary membership and sudo.
# Worked solution: tasks/rhcsa-9/solutions/rhcsa-users-sudo/solve.sh
schema_version: 1
id: rhcsa-users-sudo
title: Users, groups and sudo
domain: user-group-management
track: rhcsa-9
time_minutes: 15
description: |
  Operative — a new analyst is joining your cell, and the team needs elevated
  access on this node. Provision it:
    - a group "dbadmins" (GID 4000)
    - a user "dba" (UID 3001, shell /bin/bash) in the wheel and dbadmins groups
    - full sudo for the dbadmins group via a drop-in /etc/sudoers.d/dbadmins

checks:
  - id: dbadmins-group
    description: group dbadmins exists with GID 4000
    hint: 'groupadd -g 4000 dbadmins'
    why: "A group is just a name-to-GID mapping in /etc/group; pinning the GID makes it identical across every host you build."
    type: group
    name: dbadmins
    gid: 4000

  - id: dba-user
    description: user dba exists with UID 3001 and shell /bin/bash
    hint: 'useradd -u 3001 -s /bin/bash -G wheel,dbadmins dba'
    why: "useradd -u fixes the UID and -s the login shell; -G adds supplementary groups at create time so you don't need a second command."
    type: user
    name: dba
    uid: 3001
    shell: /bin/bash

  - id: dba-in-wheel
    description: dba is a member of wheel
    hint: 'usermod -aG wheel dba'
    why: "wheel is the group RHEL's default sudoers grants admin to. ALWAYS use usermod -aG: drop the -a and you REPLACE the user's entire supplementary list."
    type: user-in-group
    user: dba
    group: wheel

  - id: dba-in-dbadmins
    description: dba is a member of dbadmins
    hint: 'usermod -aG dbadmins dba'
    why: "Same -aG rule; a usermod -G without -a would silently wipe the wheel membership you just added."
    type: user-in-group
    user: dba
    group: dbadmins

  - id: dbadmins-sudo
    description: /etc/sudoers.d/dbadmins grants the dbadmins group sudo
    hint: "echo '%dbadmins ALL=(ALL) ALL' > /etc/sudoers.d/dbadmins"
    why: "sudo reads drop-ins from /etc/sudoers.d; a line beginning with % targets a GROUP, not a user. Keep the file mode 0440 and validate with visudo -c."
    type: file-content
    path: /etc/sudoers.d/dbadmins
    contains: "%dbadmins"
