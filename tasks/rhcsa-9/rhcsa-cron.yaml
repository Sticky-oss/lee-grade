# RHCSA (EX200): a scheduled task in a user's crontab.
# Worked solution: tasks/rhcsa-9/solutions/rhcsa-cron/solve.sh
schema_version: 1
id: rhcsa-cron
title: Scheduled backup job
domain: scheduled-tasks
track: rhcsa-9
time_minutes: 10
description: |
  Set this node to phone home to cold storage on a schedule, unattended:
    - an executable script /usr/local/bin/backup.sh (mode 0755)
    - scheduled in dba's crontab to run every day at 03:00

checks:
  - id: backup-script
    description: /usr/local/bin/backup.sh exists and is executable (0755)
    hint: 'install -m 0755 a script at /usr/local/bin/backup.sh'
    why: "cron runs the path you give it as that user; the script must be executable (0755) or the job fails silently."
    type: file
    path: /usr/local/bin/backup.sh
    kind: file
    mode: 0755

  - id: dba-cron
    description: dba has a 03:00 daily cron entry running /usr/local/bin/backup.sh
    hint: "crontab -u dba: '0 3 * * * /usr/local/bin/backup.sh'"
    why: "User crontabs are per-user (crontab -u dba -e). The five time fields are min hour dom mon dow, so '0 3 * * *' means 03:00 every day."
    type: cron-job
    user: dba
    schedule: "0 3 * * *"
    command: /usr/local/bin/backup.sh
