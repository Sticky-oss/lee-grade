# RHCSA (EX200): a collaborative setgid directory.
# Worked solution: tasks/rhcsa-9/solutions/rhcsa-shared-dir/solve.sh
schema_version: 1
id: rhcsa-shared-dir
title: Collaborative setgid directory
domain: permissions
track: rhcsa-9
time_minutes: 10
description: |
  Your cell needs a shared dead-drop on this node — a directory every analyst
  can write to, where new files inherit the team's group automatically:
    - /srv/teamdata, group-owned by "dbadmins"
    - mode 2770 (setgid set, so new files inherit the group; no access for others)

checks:
  - id: teamdata-is-dir
    description: /srv/teamdata is a directory
    hint: 'mkdir -p /srv/teamdata'
    why: "A collaborative share is just a directory; the behaviour comes from its group ownership and the setgid bit, not the directory itself."
    type: file
    path: /srv/teamdata
    kind: directory

  - id: teamdata-group
    description: /srv/teamdata is group-owned by dbadmins
    hint: 'chgrp dbadmins /srv/teamdata'
    why: "New files inherit a directory's GROUP only when the dir is group-owned by the team (and has setgid set)."
    type: file
    path: /srv/teamdata
    group: dbadmins

  - id: teamdata-mode
    description: /srv/teamdata is mode 2770 (setgid)
    hint: 'chmod 2770 /srv/teamdata'
    why: "The leading 2 in 2770 is the setgid bit: files created here inherit the directory's group instead of the creator's. Plain 770 will not."
    type: file
    path: /srv/teamdata
    mode: 02770
