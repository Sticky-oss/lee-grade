# RHCSA (EX200): install and persist a service, and open it in the firewall.
# Worked solution: tasks/rhcsa-9/solutions/rhcsa-web-firewall/solve.sh
schema_version: 1
id: rhcsa-web-firewall
title: Web server with a permanent firewall rule
domain: services-firewall
track: rhcsa-9
time_minutes: 15
description: |
  Stand up the cell's public listening post and open the channel through the
  perimeter:
    - install httpd; enable it at boot and start it now
    - permanently allow the http service through the firewall (default zone)

checks:
  - id: httpd-installed
    description: the httpd package is installed
    hint: 'dnf install -y httpd'
    why: "Nothing serves until the package is present; dnf install is always step one."
    type: package-installed
    name: httpd

  - id: httpd-running
    description: httpd is enabled at boot and running now
    hint: 'systemctl enable --now httpd'
    why: "enable = start on boot, start = run now. 'enable --now' does both; doing only one is the classic miss that fails after a reboot."
    type: service-state
    unit: httpd
    enabled: true
    active: true

  - id: http-firewall
    description: http is permanently allowed in the firewall
    hint: 'firewall-cmd --permanent --add-service=http && firewall-cmd --reload'
    why: "firewalld denies by default. A runtime rule opens the port now but vanishes on reload; only --permanent plus --reload survives a reboot."
    type: firewall
    service: http
    permanent: true
