# RHCSA (EX200): set the default boot target.
# Worked solution: solutions/solve-rhcsa-practice.sh
schema_version: 1
id: rhcsa-boot-target
title: Default boot target
domain: operate-systems
track: rhcsa-9
time_minutes: 5
description: |
  Strip this node to a lean, headless operational profile — no wasted cycles on
  a desktop in the field:
    - set the default boot target to multi-user.target (text mode, no GUI)

checks:
  - id: default-target
    description: the default boot target is multi-user.target
    hint: 'systemctl set-default multi-user.target'
    why: "The default target is what systemd boots into; multi-user.target is text/server mode, graphical.target adds a GUI. systemctl set-default repoints the default.target symlink."
    type: command
    run: systemctl get-default
    equals: multi-user.target
