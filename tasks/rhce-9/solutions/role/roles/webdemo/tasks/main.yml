---
# webdemo role tasks. Uses only ansible-core builtin modules — no Galaxy
# collections required — and stays declarative so a second run reports changed=0.
- name: Install the httpd package
  ansible.builtin.dnf:
    name: httpd
    state: present

- name: Enable httpd at boot and start it now
  ansible.builtin.service:
    name: httpd
    enabled: true
    state: started

- name: Deploy the landing page from the page_title role variable
  ansible.builtin.copy:
    content: "Welcome to {{ page_title }}\n"
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: "0644"
